kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "cd /home/runner/workspace/backend && uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "backend/requirements.txt"]

[services.production.run]
args = ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--app-dir", "/home/runner/workspace/backend", "--port", "8080"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
